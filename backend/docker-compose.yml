version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: explorehimalaya_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       explorehimalaya
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target:  runner
    container_name: explorehimalaya_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        4000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/explorehimalaya
      # Override these via a .env file or your deployment platform
      JWT_SECRET:           change-me-in-production-min-32-chars
      JWT_REFRESH_SECRET:   change-me-refresh-in-production-min-32-chars
      CORS_ORIGINS:         http://localhost:5173
    ports:
      - '4000:4000'
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
